site_name: Stem Quest Academy — Operations Runbooks
site_description: Operational runbooks for the SQA Open edX platform (plugin, MFEs, theming, deploy)
# Must include the /sqa-runbooks/ subpath — GitHub project Pages serve under it, and without
# this the CSS/JS and the 404 page resolve to the domain root and 404 (unstyled site).
site_url: https://scient-systems.github.io/sqa-runbooks/

# Point MkDocs at runbooks/ so it never touches the cookiecutter Sphinx docs/ dir.
docs_dir: runbooks
site_dir: site

theme:
  name: material
  features:
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite

nav:
