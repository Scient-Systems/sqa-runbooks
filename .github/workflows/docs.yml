name: Deploy runbooks to GitHub Pages

# Builds the MkDocs site from runbooks/ and deploys it to GitHub Pages.
# Pages access control (public vs org-only) is a REPO SETTING, not configured here:
#   Settings → Pages → Build and deployment → Source = "GitHub Actions"
#   Settings → Pages → Visibility = Private  (org-only; requires GitHub Enterprise Cloud)

on:
  push:
    branches: [main]
    paths:
      - 'runbooks/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least-privilege token; Pages deploy needs pages:write + id-token:write.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-docs.txt
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
